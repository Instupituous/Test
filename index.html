<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Classy Broad Quiz</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2ff;
      color: #222;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 40px 16px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px 20px 28px;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }

    #start-screen, #quiz-container, #results-screen {
      display: none;
    }

    #start-screen.active,
    #quiz-container.active,
    #results-screen.active {
      display: block;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: #5b3fd3;
      color: #fff;
      display: inline-block;
      margin-top: 16px;
    }

    button:hover {
      background: #4a32b0;
    }

    .choice {
      border-radius: 999px;
      border: 1px solid #e0d8ff;
      padding: 10px 12px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #fafafa;
      transition: background 0.15s, border-color 0.15s, transform 0.05s;
      margin-bottom: 8px;
      color: #000000 !important;
    }
