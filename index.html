<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Classy Broad Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ⭐ Safari compatibility tags -->
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <style>
    #start-screen,
#quiz-container,
#results-screen {
  min-height: 100vh;
  height: auto;
}

    button, .choice {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
    /* Safari repaint fix */
#start-screen,
#quiz-container,
#results-screen {
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  will-change: opacity, transform;
}

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2ff;
      color: #222;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0;
      background: #ffffff;
      border-radius: 0;
      padding: 0;
      position: relative;
    }

    /* ⭐ ALL SCREENS ARE ABSOLUTE LAYERS */
    #start-screen,
    #quiz-container,
    #results-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      min-height: 100vh;
      padding: 40px 20px 60px;
      background: #ffffff;
      display: none;
      z-index: 1;
    }

    #start-screen.active,
    #quiz-container.active,
    #results-screen.active {
      display: block;
      z-index: 5;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 14px 22px;
      font-size: 1.1rem;
      cursor: pointer;
      background: #5b3fd3;
      color: #fff;
      display: block;
      margin: 24px auto 0;
      position: relative;
      z-index: 20;
    }

    button:hover {
      background: #4a32b0;
    }

    .choice {
      border-radius: 999px;
      border: 1px solid #e0d8ff;
      padding: 16px 18px;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #fafafa;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 14px;
      color: #000000 !important;
    }

    .choice:hover {
      background: #f0ebff;
      border-color: #c3b4ff;
    }

    .choice.correct {
      background: #e2f7e2;
      border-color: #4caf50;
    }

    .choice.incorrect {
      background: #ffe4e4;
      border-color: #e53935;
    }

    #feedback {
      margin-top: 16px;
      min-height: 28px;
      font-style: italic;
    }

    #progress-container {
      margin-top: 24px;
      width: 100%;
      background: #eee;
      border-radius: 8px;
      overflow: hidden;
      height: 16px;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #5b3fd3;
      transition: width 0.3s ease;
    }

    #progress-text {
      text-align: center;
      margin-top: 8px;
      font-size: 1rem;
      color: #444;
    }

    #result-photo {
      display: block;
      margin: 20px auto 0;
      max-width: 250px;
      border-radius: 12px;
    }

    /* ⭐ Emoji strip */
    .footer-strip {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .footer-strip img {
      width: 180px;
      opacity: 0.9;
      transition: width 0.3s ease;
    }

    /* ⭐ Question photo */
    #question-photo {
      display: block;
      max-width: 100%;
      border-radius: 12px;
      margin: 0 auto 20px;
      transition: all 0.3s ease;
    }

    /* ⭐ MOBILE MODE */
    @media (max-width: 600px) {
      #start-screen,
      #quiz-container,
      #results-screen {
        padding: 32px 18px 60px;
      }

      h1, h2 {
        font-size: 1.45rem;
      }

      #question-text {
        font-size: 1.25rem;
        line-height: 1.35;
      }

      .choice {
        padding: 18px 20px;
        font-size: 1.15rem;
      }

      button {
        padding: 16px 24px;
        font-size: 1.15rem;
      }

      #question-photo {
        max-width: 100%;
        margin-bottom: 26px;
      }

      .footer-strip img {
        width: 260px; /* ⭐ Option B */
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- START SCREEN -->
    <div id="start-screen" class="active">
      <h1>The Classy Broad Quiz</h1>
      <p style="text-align:center;">Are you ready to face the Council of Classy Broads?</p>

      <button id="start-btn">Start Quiz</button>

      <div class="footer-strip">
        <img src="Emojis for Quiz.jpg" alt="emoji strip">
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-container">
      <img id="question-photo" src="" style="display:none;">
      <h2 id="question-text"></h2>

      <div id="choices-container"></div>
      <div id="feedback"></div>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>

      <div id="progress-text"></div>

      <button id="next-btn" style="display:none;">Next Question</button>

      <div class="footer-strip">
        <img src="Emojis for Quiz.jpg" alt="emoji strip">
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen">
      <h2>Your Results</h2>

      <p id="score-text"></p>

      <img id="result-photo" src="" alt="" style="display:none;">

      <button id="restart-btn">Try Again</button>

      <div class="footer-strip">
        <img src="Emojis for Quiz.jpg" alt="emoji strip">
      </div>
    </div>

  </div>
  <script>
  // Safari NodeList.forEach polyfill
  if (window.NodeList && !NodeList.prototype.forEach) {
    NodeList.prototype.forEach = Array.prototype.forEach;
  }
</script>

  <script>
    /* ⭐ QUIZ DATA */
    const quiz = [
      {
        question: "What the heck does this guy want from Elisa Ellen, anyway?",
        photo: "MeinxmasChair.jpg",
        choices: [
          "Nothing",
          "Can I buy a vowel?",
          "Selfless Partnership",
          "1.21 gigawatts"
        ],
        answerIndex: 2,
        correctResponse: "Correct. The Council beams with approval — selfless partnership is the only acceptable answer.",
        incorrectResponse: "Incorrect. The Council squints at the photo, then at you, then back at the photo. Try again, mortal."
      },

      /* ⭐ All your original questions follow unchanged */
      {
        question: "What is Elisa most likely to be doing when she enters her full Classy Broad form?",
        choices: ["Sipping wine", "Fixing her hair", "Giving a side‑eye", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. The Council of Classy Broads rises as Queen Elisa Ellen ascends.",
        incorrectResponse: "Incorrect. The Council tilts its head in confusion, Elisa Ellen Mineck expected better."
      },
      {
        question: "Which nickname best captures her energy on a good day?",
        choices: ["Queen", "Baller Queen", "Classy Broad", "All of them, obviously"],
        answerIndex: 3,
        correctResponse: "Correct. She contains multitudes and all of them are iconic.",
        incorrectResponse: "Incorrect. The Council whispers, 'She is ALL of these, mortal.'"
      },
      {
        question: "What is Elisa’s signature classy move?",
        choices: ["The hair tuck", "The knowing smirk", "The elegant eye roll", "The 'I’m not mad, just disappointed'"],
        answerIndex: 1,
        correctResponse: "Correct. The smirk that could launch a thousand ships.",
        incorrectResponse: "Incorrect. The Council smirks at YOU now."
      },
      {
        question: "What drink transforms her into her final form?",
        choices: ["Malbec", "Champagne", "Old Fashioned", "Espresso martini"],
        answerIndex: 0,
        correctResponse: "Correct. Malbec unlocks the Baller Queen.",
        incorrectResponse: "Incorrect. The Council swirls a glass of Malbec in judgment."
      },
     {
        question: "Who is this dashing gentleman?",
        photo: "Neil Fallon.jpg",
        choices: [
          " Ragnar O’Sealegs, pirate laureate of questionable ballads",
          " Grunk the Unwashed, inventor of yelling",
          " Ye Ole Mossbeard, keeper of the forest’s damp secrets",
          " Neil Fallon of Clutch, prophet of riff‑driven wisdom"
        ],
        answerIndex: 3,
        correctResponse: " Correct. The Earth’s rotation stabilizes; the Riff Prophets smile upon your wisdom.",
        incorrectResponse: " Incorrect. A cosmic blues riff fades out in disappointment. Try again."
      },

      {
        question: "What is Elisa’s preferred level of chaos?",
        choices: ["Low", "Medium", "High", "Elegant chaos only"],
        answerIndex: 3,
        correctResponse: "Correct. She is chaos, but make it couture.",
        incorrectResponse: "Incorrect. The Council adjusts its pearls in disapproval."
      },
      {
        question: "Which of these best describes her laugh?",
        choices: ["Cute giggle", "Full‑body laugh", "Silent wheeze", "The 'I can’t breathe' laugh"],
        answerIndex: 1,
        correctResponse: "Correct. The laugh that could end wars.",
        incorrectResponse: "Incorrect. The Council demands you study and know thyself."
      },
      {
        question: "What is her most powerful weapon?",
        choices: ["Her smile", "Her confidence", "Her sarcasm", "Her entire existence"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Ellen is a full arsenal.",
        incorrectResponse: "Incorrect. The Council sighs, 'Her power is limitless.'"
      },
      {
        question: "Which of these is she most likely to say?",
        choices: ["'I’m fine.'", "'NOPE!'", "'You’re ridiculous.'", "'All of the above.'"],
        answerIndex: 1,
        correctResponse: "Correct. Do not even try it.",
        incorrectResponse: "Incorrect. The Council mutters, 'This was a gimme.'"
      },
      {
        question: "What is her ideal date vibe?",
        choices: ["Cozy night in", "Fancy dinner", "Adventure day", "Whatever makes her feel like a classy broad"],
        answerIndex: 3,
        correctResponse: "Correct. She deserves nothing less.",
        incorrectResponse: "Incorrect. The Council raises an eyebrow at your oversight."
      },
      {
        question: "What is The Queen’s hidden superpower?",
        choices: ["Reading people instantly", "Looking flawless effortlessly", "Making you laugh", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Ellen is a multi‑class hero.",
        incorrectResponse: "Incorrect. The Council chuckles knowingly."
      },
      {
        question: "Which animal matches her energy?",
        choices: ["Swan", "Panther", "Golden retriever", "Fox"],
        answerIndex: 1,
        correctResponse: "Correct. Elegant, powerful, and will absolutely end you if needed.",
        incorrectResponse: "Incorrect. The Council prowls in disappointment."
      },
      {
        question: "What is her go‑to move when she’s unimpressed?",
        choices: ["The eyebrow raise", "The slow blink", "The head tilt", "The 'really?' face"],
        answerIndex: 3,
        correctResponse: "Correct. If looks could kill.",
        incorrectResponse: "Incorrect. The Council raises its collective eyebrow at YOU."
      },
      {
        question: "What is her preferred love language?",
        choices: ["Quality time", "Sarcastic banter", "Acts of service", "Looking at you like you’re lucky to be here"],
        answerIndex: 1,
        correctResponse: "Correct. Banter is her cardio.",
        incorrectResponse: "Incorrect. The Council roasts you gently."
      },
      {
        question: "What is her most iconic trait?",
        choices: ["Her class", "Her humor", "Her confidence", "Her ability to be all three at once"],
        answerIndex: 3,
        correctResponse: "Correct. She is the trifecta.",
        incorrectResponse: "Incorrect. The Council shakes its head in disbelief."
      },
      {
        question: "What is she most likely to steal from you?",
        choices: ["Your hoodie", "Your coffee", "Your heart", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. She already has.",
        incorrectResponse: "Incorrect. The Council whispers unflattering commentary."
      },
  {
  question: "Who is in this photo?",
  photo: "Julia Plotting.jpg",
  choices: [
    "An evil succubus mischievously plotting to steal your soul",
    "The person who steals Steve’s Titans seat whenever Elisa decides the stadium needs better energy",
    "Your wonderful, supportive, and loving daughter Julia",
    "A creature who haunts youth sports fields demanding gluten-free options that never exist"
  ],
  answerIndex: 2,
  correctResponse: "Correct! Julia is the star of the show — even in shadow form.",
  incorrectResponse: "Incorrect! But honestly, with this photo, any of those answers felt possible."
},

      {
        question: "What is her vibe when she dresses up?",
        choices: ["Elegant", "Dangerous", "Untouchable", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. She becomes the final boss.",
        incorrectResponse: "Incorrect. The Council adjusts her crown for her."
      },
      {
        question: "What is her preferred way to win an argument?",
        choices: ["Logic", "Sarcasm", "Being right", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Mineck wins by existing.",
        incorrectResponse: "Incorrect. The Council rules in her favor anyway."
      },
      {
        question: "What is the correct title for Elisa at the end of this quiz?",
        choices: ["Queen Elisa", "Elisa Ellen the Classy Broad", "Baller Queen Mineck", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Bow before her.",
        incorrectResponse: "Incorrect. The Council gasps dramatically."
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const startScreen = document.getElementById("start-screen");
    const quizContainer = document.getElementById("quiz-container");
    const resultsScreen = document.getElementById("results-screen");

    const questionText = document.getElementById("question-text");
    const questionPhoto = document.getElementById("question-photo");
    const choicesContainer = document.getElementById("choices-container");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const resultPhoto = document.getElementById("result-photo");

    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");

    /* ⭐ Start Quiz */
   document.getElementById("start-btn").addEventListener("click", () => {
  startScreen.classList.remove("active");

  // Safari needs a tiny delay to repaint the screen
  setTimeout(() => {
    quizContainer.classList.add("active");
    showQuestion();
  }, 50);
});


    /* ⭐ Restart Quiz */
    document.getElementById("restart-btn").addEventListener("click", () => {
      location.reload();
    });

    /* ⭐ Next Question */
    nextBtn.addEventListener("click", () => {
      if (currentQuestionIndex < quiz.length - 1) {
        currentQuestionIndex++;
        showQuestion();
      } else {
        showResults();
      }
    });

    /* ⭐ Display Question */
    function showQuestion() {
      hasAnswered = false;
      feedback.textContent = "";
      nextBtn.style.display = "none";
      choicesContainer.innerHTML = "";

      const q = quiz[currentQuestionIndex];
      const questionNumber = currentQuestionIndex + 1;

      questionText.textContent = `${questionNumber}. ${q.question}`;

      if (q.photo) {
        questionPhoto.src = q.photo;
        questionPhoto.style.display = "block";
      } else {
        questionPhoto.style.display = "none";
      }

      const progressPercent = Math.round((questionNumber / quiz.length) * 100);
      progressBar.style.width = progressPercent + "%";
      progressText.textContent = `Progress: ${progressPercent}%`;

      q.choices.forEach((choiceText, index) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choiceText;
        btn.addEventListener("click", () => handleAnswer(index));
        choicesContainer.appendChild(btn);
      });
    }

    /* ⭐ Handle Answer */
    function handleAnswer(selectedIndex) {
      if (hasAnswered) return;
      hasAnswered = true;

      const q = quiz[currentQuestionIndex];
      const choiceButtons = Array.from(document.getElementsByClassName("choice"));

      choiceButtons.forEach((btn, index) => {
        if (index === q.answerIndex) {
          btn.classList.add("correct");
        }
        if (index === selectedIndex && index !== q.answerIndex) {
          btn.classList.add("incorrect");
        }
        btn.disabled = true;
      });

      if (selectedIndex === q.answerIndex) {
        score++;
        feedback.textContent = q.correctResponse;
      } else {
        feedback.textContent = q.incorrectResponse;
      }

      nextBtn.textContent =
        currentQuestionIndex === quiz.length - 1 ? "See Results" : "Next Question";

      nextBtn.style.display = "block";
    }

    /* ⭐ Show Results */
    function showResults() {
      quizContainer.classList.remove("active");
      resultsScreen.classList.add("active");

      scoreText.textContent = `You scored ${score} out of ${quiz.length}. `;

      if (score === quiz.length) {
        scoreText.textContent += "Flawless. Queen Elisa Ellen approves.";
      } else if (score > quiz.length * 0.7) {
        scoreText.textContent += "Strong showing. The Council nods respectfully.";
      } else {
        scoreText.textContent += "The Council gasps dramatically.";
      }
    }
  </script>
</body>
</html>
