<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Classy Broad Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2ff;
      color: #222;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0;
      background: #ffffff;
      border-radius: 0;
      padding: 0;
      position: relative;
    }

    /* ⭐ ALL SCREENS ARE NOW ABSOLUTE LAYERS */
    #start-screen,
    #quiz-container,
    #results-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      min-height: 100vh;
      padding: 40px 20px 60px;
      background: #ffffff;
      display: none;
      z-index: 1;
    }

    #start-screen.active,
    #quiz-container.active,
    #results-screen.active {
      display: block;
      z-index: 5;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 14px 22px;
      font-size: 1.1rem;
      cursor: pointer;
      background: #5b3fd3;
      color: #fff;
      display: block;
      margin: 24px auto 0;
      position: relative;
      z-index: 20;
    }

    button:hover {
      background: #4a32b0;
    }

    .choice {
      border-radius: 999px;
      border: 1px solid #e0d8ff;
      padding: 16px 18px;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #fafafa;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 14px;
      color: #000000 !important;
    }

    .choice:hover {
      background: #f0ebff;
      border-color: #c3b4ff;
    }

    .choice.correct {
      background: #e2f7e2;
      border-color: #4caf50;
    }

    .choice.incorrect {
      background: #ffe4e4;
      border-color: #e53935;
    }

    #feedback {
      margin-top: 16px;
      min-height: 28px;
      font-style: italic;
    }

    #progress-container {
      margin-top: 24px;
      width: 100%;
      background: #eee;
      border-radius: 8px;
      overflow: hidden;
      height: 16px;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #5b3fd3;
      transition: width 0.3s ease;
    }

    #progress-text {
      text-align: center;
      margin-top: 8px;
      font-size: 1rem;
      color: #444;
    }

    #result-photo {
      display: block;
      margin: 20px auto 0;
      max-width: 250px;
      border-radius: 12px;
    }

    /* ⭐ Emoji strip */
    .footer-strip {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .footer-strip img {
      width: 180px;
      opacity: 0.9;
      transition: width 0.3s ease;
    }

    /* ⭐ Question photo */
    #question-photo {
      display: block;
      max-width: 100%;
      border-radius: 12px;
      margin: 0 auto 20px;
      transition: all 0.3s ease;
    }

    /* ⭐ MOBILE MODE */
    @media (max-width: 600px) {
      #start-screen,
      #quiz-container,
      #results-screen {
        padding: 32px 18px 60px;
      }

      h1, h2 {
        font-size: 1.45rem;
      }

      #question-text {
        font-size: 1.25rem;
        line-height: 1.35;
      }

      .choice {
        padding: 18px 20px;
        font-size: 1.15rem;
      }

      button {
        padding: 16px 24px;
        font-size: 1.15rem;
      }

      #question-photo {
        max-width: 100%;
        margin-bottom: 26px;
      }

      .footer-strip img {
        width: 260px; /* ⭐ Option B */
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- START SCREEN -->

      <button id="start-btn">Start Quiz</button>

      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-container">

      <h2 id="question-text"></h2>
      <div id="choices-container"></div>
      <div id="feedback"></div>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text"></div>

      <button id="next-btn" style="display:none;">Next Question</button>

      <div class="footer-strip">
        <img src="Emojis for Quiz.jpg" alt="emoji strip">
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen">
      <h2>Your Results</h2>
      <p id="score-text"></p>
      <img id="result-photo" src="" alt="" style="display:none;">
      <button id="restart-btn">Try Again</button>

      <div class="footer-strip">
        <img src="Emojis for Quiz.jpg" alt="emoji strip">

    </div>

  </div>
