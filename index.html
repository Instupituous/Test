<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Classy Broad Quiz</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2ff;
      color: #222;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 40px 16px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px 20px 28px;
    }

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }

    #start-screen, #quiz-container, #results-screen {
      display: none;
    }

    #start-screen.active,
    #quiz-container.active,
    #results-screen.active {
      display: block;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: #5b3fd3;
      color: #fff;
      display: inline-block;
      margin-top: 16px;
    }

    button:hover {
      background: #4a32b0;
    }

    .choice {
      border-radius: 999px;
      border: 1px solid #e0d8ff;
      padding: 10px 12px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #fafafa;
      transition: background 0.15s, border-color 0.15s, transform 0.05s;
      margin-bottom: 8px;
      color: #000000 !important;
    }

    .choice:hover {
      background: #f0ebff;
      border-color: #c3b4ff;
    }

    .choice.correct {
      background: #e2f7e2;
      border-color: #4caf50;
    }

    .choice.incorrect {
      background: #ffe4e4;
      border-color: #e53935;
    }

    #feedback {
      margin-top: 12px;
      min-height: 24px;
      font-style: italic;
    }

    #score-text {
      text-align: center;
      margin-top: 12px;
    }

    #result-photo {
      display: block;
      margin: 16px auto 0;
      max-width: 250px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- START SCREEN -->
    <div id="start-screen" class="active">
      <h1>The Classy Broad Quiz</h1>
      <p>Are you ready to face the Council of Classy Broads?</p>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-container">
      <h2 id="question-text"></h2>
      <div id="choices-container"></div>
      <div id="feedback"></div>
      <button id="next-btn" style="display:none;">Next Question</button>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen">
      <h2>Your Results</h2>
      <p id="score-text"></p>
      <img id="result-photo" src="" alt="" style="display:none;">
      <button id="restart-btn">Try Again</button>
    </div>

  </div>

  <script>
    const quiz = [
      {
        question: "What is Elisa most likely to be doing when she enters her full Classy Broad form?",
        choices: ["Sipping wine", "Fixing her hair", "Giving a side‑eye", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. The Council of Classy Broads rises as Queen Elisa Ellen ascends.",
        incorrectResponse: "Incorrect. The Council tilts its head in confusion, Elisa Ellen Mineck expected better."
      },
      {
        question: "Which nickname best captures her energy on a good day?",
        choices: ["Queen", "Baller Queen", "Classy Broad", "All of them, obviously"],
        answerIndex: 3,
        correctResponse: "Correct. She contains multitudes and all of them are iconic.",
        incorrectResponse: "Incorrect. The Council whispers, 'She is ALL of these, mortal.'"
      },
      {
        question: "What is Elisa’s signature classy move?",
        choices: ["The hair tuck", "The knowing smirk", "The elegant eye roll", "The 'I’m not mad, just disappointed'"],
        answerIndex: 1,
        correctResponse: "Correct. The smirk that could launch a thousand ships.",
        incorrectResponse: "Incorrect. The Council smirks at YOU now."
      },
      {
        question: "What drink transforms her into her final form?",
        choices: ["Malbec", "Champagne", "Old Fashioned", "Espresso martini"],
        answerIndex: 0,
        correctResponse: "Correct. Malbec unlocks the Baller Queen.",
        incorrectResponse: "Incorrect. The Council swirls a glass of Malbec in judgment."
      },
      {
        question: "Which city best represents the two of us together?",
        choices: ["Nashville", "San Diego", "Cozumel", "New Yawk"],
        answerIndex: 0,
        correctResponse: "Correct. Nashville: home of Queen Elisa Mineck and her loyal subject.",
        incorrectResponse: "Incorrect. The Council strums a sad country chord."
      },
      {
        question: "What is Elisa’s preferred level of chaos?",
        choices: ["Low", "Medium", "High", "Elegant chaos only"],
        answerIndex: 3,
        correctResponse: "Correct. She is chaos, but make it couture.",
        incorrectResponse: "Incorrect. The Council adjusts its pearls in disapproval."
      },
      {
        question: "Which of these best describes her laugh?",
        choices: ["Cute giggle", "Full‑body laugh", "Silent wheeze", "The 'I can’t breathe' laugh"],
        answerIndex: 1,
        correctResponse: "Correct. The laugh that could end wars.",
        incorrectResponse: "Incorrect. The Council demands you study and know thyself."
      },
      {
        question: "What is her most powerful weapon?",
        choices: ["Her smile", "Her confidence", "Her sarcasm", "Her entire existence"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Ellen is a full arsenal.",
        incorrectResponse: "Incorrect. The Council sighs, 'Her power is limitless.'"
      },
      {
        question: "Which of these is she most likely to say?",
        choices: ["'I’m fine.'", "'NOPE!'", "'You’re ridiculous.'", "'All of the above.'"],
        answerIndex: 1,
        correctResponse: "Correct. Do not even try it.",
        incorrectResponse: "Incorrect. The Council mutters, 'This was a gimme.'"
      },
      {
        question: "What is her ideal date vibe?",
        choices: ["Cozy night in", "Fancy dinner", "Adventure day", "Whatever makes her feel like a classy broad"],
        answerIndex: 3,
        correctResponse: "Correct. She deserves nothing less.",
        incorrectResponse: "Incorrect. The Council raises an eyebrow at your oversight."
      },
      {
        question: "What is The Queen’s hidden superpower?",
        choices: ["Reading people instantly", "Looking flawless effortlessly", "Making you laugh", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Ellen is a multi‑class hero.",
        incorrectResponse: "Incorrect. The Council chuckles knowingly."
      },
      {
        question: "Which animal matches her energy?",
        choices: ["Swan", "Panther", "Golden retriever", "Fox"],
        answerIndex: 1,
        correctResponse: "Correct. Elegant, powerful, and will absolutely end you if needed.",
        incorrectResponse: "Incorrect. The Council prowls in disappointment."
      },
      {
        question: "What is her go‑to move when she’s unimpressed?",
        choices: ["The eyebrow raise", "The slow blink", "The head tilt", "The 'really?' face"],
        answerIndex: 3,
        correctResponse: "Correct. If looks could kill.",
        incorrectResponse: "Incorrect. The Council raises its collective eyebrow at YOU."
      },
      {
        question: "What is her preferred love language?",
        choices: ["Quality time", "Sarcastic banter", "Acts of service", "Looking at you like you’re lucky to be here"],
        answerIndex: 1,
        correctResponse: "Correct. Banter is her cardio.",
        incorrectResponse: "Incorrect. The Council roasts you gently."
      },
      {
        question: "What is her most iconic trait?",
        choices: ["Her class", "Her humor", "Her confidence", "Her ability to be all three at once"],
        answerIndex: 3,
        correctResponse: "Correct. She is the trifecta.",
        incorrectResponse: "Incorrect. The Council shakes its head in disbelief."
      },
      {
        question: "What is she most likely to steal from you?",
        choices: ["Your hoodie", "Your coffee", "Your heart", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. She already has.",
        incorrectResponse: "Incorrect. The Council whispers unflattering commentary."
      },
      {
        question: "What is her reaction when you make her laugh unexpectedly?",
        choices: ["A snort", "A shoulder grab", "A 'stop it!' moment", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. The Elisa Ellen laugh trifecta.",
        incorrectResponse: "Incorrect. The Council demands more field research."
      },
      {
        question: "What is her vibe when she dresses up?",
        choices: ["Elegant", "Dangerous", "Untouchable", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. She becomes the final boss.",
        incorrectResponse: "Incorrect. The Council adjusts her crown for her."
      },
      {
        question: "What is her preferred way to win an argument?",
        choices: ["Logic", "Sarcasm", "Being right", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Queen Elisa Mineck wins by existing.",
        incorrectResponse: "Incorrect. The Council rules in her favor anyway."
      },
      {
        question: "What is the correct title for Elisa at the end of this quiz?",
        choices: ["Queen Elisa", "Elisa Ellen the Classy Broad", "Baller Queen Mineck", "All of the above"],
        answerIndex: 3,
        correctResponse: "Correct. Bow before her.",
        incorrectResponse: "Incorrect. The Council gasps dramatically."
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const startScreen = document.getElementById("start-screen");
    const quizContainer = document.getElementById("quiz-container");
    const resultsScreen = document.getElementById("results-screen");

    const questionText = document.getElementById("question-text");
    const choicesContainer = document.getElementById("choices-container");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const resultPhoto = document.getElementById("result-photo");

    document.getElementById("start-btn").addEventListener("click", () => {
      startScreen.classList.remove("active");
      quizContainer.classList.add("active");
      showQuestion();
    });

    document.getElementById("restart-btn").addEventListener("click", () => {
      location.reload();
    });

    nextBtn.addEventListener("click", () => {
      if (currentQuestionIndex < quiz.length - 1) {
        currentQuestionIndex++;
        showQuestion();
      } else {
        showResults();
      }
    });

    function showQuestion() {
      hasAnswered = false;
      feedback.textContent = "";
      nextBtn.style.display = "none";
      choicesContainer.innerHTML = "";

      const q = quiz[currentQuestionIndex];
      questionText.textContent = q.question;

      q.choices.forEach((choiceText, index) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choiceText;
        btn.addEventListener("click", () => handleAnswer(index));
        choicesContainer.appendChild(btn);
      });
    }

    function handleAnswer(selectedIndex) {
      if (hasAnswered) return;
      hasAnswered = true;

      const q = quiz[currentQuestionIndex];
      const choiceButtons = Array.from(document.getElementsByClassName("choice"));

      choiceButtons.forEach((btn, index) => {
        if (index === q.answerIndex) {
          btn.classList.add("correct");
        }
        if (index === selectedIndex && index !== q.answerIndex) {
          btn.classList.add("incorrect");
        }
        btn.disabled = true;
      });

      if (selectedIndex === q.answerIndex) {
        score++;
        feedback.textContent = q.correctResponse;
      } else {
        feedback.textContent = q.incorrectResponse;
      }

      // 🔥 FIX: Change button text on last question
      if (currentQuestionIndex === quiz.length - 1) {
        nextBtn.textContent = "See Results";
      } else {
        nextBtn.textContent = "Next Question";
      }

      nextBtn.style.display = "inline-block";
    }

    function showResults() {
      quizContainer.classList.remove("active");
      resultsScreen.classList.add("active");

      scoreText.textContent = `You scored ${score} out of ${quiz.length}. `;

      if (score === quiz.length) {
        scoreText.textContent += "Flawless. Queen Elisa Ellen approves.";
      } else if (score > quiz.length * 0.7) {
        scoreText.textContent += "Strong showing. The Council nods respectfully.";
      } else {
        scoreText.textContent += "The Council gasps dramatically.";
      }

      // Optional: add a photo
      // resultPhoto.src = "queen.jpg";
      // resultPhoto.style.display = "block";
    }
  </script>
</body>
</html>
