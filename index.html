<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ⭐ Safari compatibility tags -->
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  

  <style>

/* ⭐ Make the page scroll normally */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  overflow-y: auto;
  background: #f5f2ff;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #222;
}

/* ⭐ Container stays centered */
.container {
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  background: #ffffff;
  position: relative;
  padding: 0;
}

/* ⭐ Screens stack but scroll independently */
#start-screen,
#quiz-container,
#results-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  padding: 40px 20px 60px;
  background: #ffffff;
  display: none;
  z-index: 1;

  /* ⭐ Make each screen scrollable */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  /* Safari repaint stability */
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  will-change: opacity, transform;
}

#start-screen.active,
#quiz-container.active,
#results-screen.active {
  display: block;
  z-index: 5;
}

/* ⭐ Typography */
h1, h2 {
  text-align: center;
  margin-top: 0;
}

/* ⭐ Buttons */
button {
  border-radius: 999px;
  border: none;
  padding: 14px 22px;
  font-size: 1.1rem;
  cursor: pointer;
  background: #5b3fd3;
  color: #fff;
  display: block;
  margin: 24px auto 0;
  position: relative;
  z-index: 20;
}

button:hover {
  background: #4a32b0;
}

/* ⭐ Choices */
.choice {
  border-radius: 999px;
  border: 1px solid #e0d8ff;
  padding: 16px 18px;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: #fafafa;
  transition: background 0.15s, border-color 0.15s;
  margin-bottom: 14px;
  color: #000000 !important;
}

.choice:hover {
  background: #f0ebff;
  border-color: #c3b4ff;
}

.choice.correct {
  background: #e2f7e2;
  border-color: #4caf50;
}

.choice.incorrect {
  background: #ffe4e4;
  border-color: #e53935;
}

/* ⭐ Feedback */
#feedback {
  margin-top: 16px;
  min-height: 28px;
  font-style: italic;
}

/* ⭐ Progress bar */
#progress-container {
  margin-top: 24px;
  width: 100%;
  background: #eee;
  border-radius: 8px;
  overflow: hidden;
  height: 16px;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: #5b3fd3;
  transition: width 0.3s ease;
}

#progress-text {
  text-align: center;
  margin-top: 8px;
  font-size: 1rem;
  color: #444;
}

/* ⭐ Photos */
#result-photo,
#question-photo {
  display: block;
  max-width: 100%;
  border-radius: 12px;
  margin: 20px auto;
  transition: all 0.3s ease;
}

/* ⭐ Emoji strip */
.footer-strip {
  margin-top: 32px;
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 1;
}

.footer-strip img {
  width: 180px;
  opacity: 0.9;
  transition: width 0.3s ease;
}

/* ⭐ Mobile adjustments */
@media (max-width: 600px) {
  #start-screen,
  #quiz-container,
  #results-screen {
    padding: 32px 18px 60px;
  }

  h1, h2 {
    font-size: 1.45rem;
  }

  #question-text {
    font-size: 1.25rem;
    line-height: 1.35;
  }

  .choice {
    padding: 18px 20px;
    font-size: 1.15rem;
  }

  button {
    padding: 16px 24px;
    font-size: 1.15rem;
  }

  #question-photo {
    margin-bottom: 26px;
  }

  .footer-strip img {
    width: 260px;
  }
}

</style>
</head>
<body>

    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const startScreen = document.getElementById("start-screen");
    const quizContainer = document.getElementById("quiz-container");
    const resultsScreen = document.getElementById("results-screen");

    const questionText = document.getElementById("question-text");
    const questionPhoto = document.getElementById("question-photo");
    const choicesContainer = document.getElementById("choices-container");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const resultPhoto = document.getElementById("result-photo");

    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");

    /* ⭐ Start Quiz */
   document.getElementById("start-btn").addEventListener("click", () => {
  startScreen.classList.remove("active");

  // Safari needs a tiny delay to repaint the screen
  setTimeout(() => {
    quizContainer.classList.add("active");
    showQuestion();
  }, 50);
});


    /* ⭐ Restart Quiz */
    document.getElementById("restart-btn").addEventListener("click", () => {
      location.reload();
    });
    /* ⭐ Next Question */
    nextBtn.addEventListener("click", () => {
  const q = quiz[currentQuestionIndex];

  if (Array.isArray(q.correctAnswers)) {
    // Multi-select question → evaluate checkboxes
    handleMultiSelect(q);
  } else {
    // Single-choice question → move to next question
    if (currentQuestionIndex < quiz.length - 1) {
      currentQuestionIndex++;
      showQuestion();
    } else {
      showResults();
    }
  }
});
function renderChoices(q) {
  const container = document.getElementById("choices-container");
  container.innerHTML = "";

  const isMulti = Array.isArray(q.correctAnswers);
  const nextBtn = document.getElementById("next-btn");

  q.choices.forEach((choiceText, index) => {
    const choiceDiv = document.createElement("div");
    choiceDiv.className = "choice";

    if (isMulti) {
      // Checkbox mode
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = index;
      checkbox.className = "multi-checkbox";

      const label = document.createElement("span");
      label.textContent = choiceText;

      choiceDiv.appendChild(checkbox);
      choiceDiv.appendChild(label);

      // Allow clicking the whole row to toggle the checkbox
      choiceDiv.addEventListener("click", (e) => {
        if (e.target.tagName !== "INPUT") {
          checkbox.checked = !checkbox.checked;
        }
      });

    } else {
      // Single-choice mode
      choiceDiv.textContent = choiceText;
      choiceDiv.addEventListener("click", () => handleAnswer(index));
    }

    container.appendChild(choiceDiv);
  });

  // ⭐ Button behavior for multi-select
  if (isMulti) {
    nextBtn.textContent = "Submit";
    nextBtn.style.display = "block";
  } else {
    nextBtn.style.display = "none";
  }
}
function handleMultiSelect(q) {
    // Evaluate selected checkboxes
    const selected = Array.from(
        document.querySelectorAll("input[type='checkbox']:checked")
    ).map(cb => parseInt(cb.value));

    const key = selected.sort().join(",");

    const response = q.responses[key] || "Interesting choice.";

    feedback.textContent = response;

    // Change button text
    nextBtn.textContent =
        currentQuestionIndex === quiz.length - 1 ? "See Results" : "Next Question";

    // Remove old handlers + attach one clean handler
    const newNextBtn = nextBtn.cloneNode(true);
    nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
    nextBtn = newNextBtn;

    nextBtn.addEventListener("click", () => {
        if (currentQuestionIndex < quiz.length - 1) {
            currentQuestionIndex++;
            showQuestion();
        } else {
            showResults();
        }
    });

    nextBtn.style.display = "block";
}



  const response = q.responses[key] || "Incorrect — but your gluten-free spirit remains unbroken.";

  document.getElementById("feedback").textContent = response;

  // Score only if perfect match
  const correctKey = q.correctAnswers.slice().sort((a, b) => a - b).join(",");
  if (key === correctKey) score++;

  // ⭐ AFTER submitting, change the button to “Next Question”
  nextBtn.textContent =
    currentQuestionIndex === quiz.length - 1 ? "See Results" : "Next Question";

  // ⭐ NOW clicking the button advances
// Remove ALL previous click handlers safely
const newNextBtn = nextBtn.cloneNode(true);
nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);

// Attach ONE clean handler
newNextBtn.addEventListener("click", () => {
    if (currentQuestionIndex < quiz.length - 1) {
        currentQuestionIndex++;
        showQuestion();
    } else {
        showResults();
    }
});


newNextBtn.addEventListener("click", () => {
    nextBtn.addEventListener("click", () => {
    if (currentQuestionIndex < quiz.length - 1) {
        currentQuestionIndex++;
        showQuestion();
    } else {
        showResults();
    }
});

    const questionNumber = currentQuestionIndex + 1;

    questionText.textContent = `${questionNumber}. ${q.question}`;

    if (q.photo) {
        questionPhoto.src = q.photo;
        questionPhoto.style.display = "block";
    } else {
        questionPhoto.style.display = "none";
    }

    const progressPercent = Math.round((questionNumber / quiz.length) * 100);
    progressBar.style.width = progressPercent + "%";
    progressText.textContent = `Progress: ${progressPercent}%`;

    renderChoices(q);
}


    /* ⭐ Handle Answer */
    function handleAnswer(selectedIndex) {
      if (hasAnswered) return;
      hasAnswered = true;

      const q = quiz[currentQuestionIndex];
      const choiceButtons = Array.from(document.getElementsByClassName("choice"));

      choiceButtons.forEach((btn, index) => {
        if (index === q.answerIndex) {
          btn.classList.add("correct");
        }
        if (index === selectedIndex && index !== q.answerIndex) {
          btn.classList.add("incorrect");
        }
        btn.disabled = true;
      });

      if (selectedIndex === q.answerIndex) {
        score++;
        feedback.textContent = q.correctResponse;
      } else {
        feedback.textContent = q.incorrectResponse;
      }

      nextBtn.textContent =
        currentQuestionIndex === quiz.length - 1 ? "See Results" : "Next Question";


      nextBtn.style.display = "block";
    }

    /* ⭐ Show Results */
    function showResults() {
      quizContainer.classList.remove("active");
      resultsScreen.classList.add("active");

      scoreText.textContent = `You scored ${score} out of ${quiz.length}. `;

      if (score === quiz.length) {
        scoreText.textContent += "Flawless. Queen Elisa Ellen approves.";
      } else if (score > quiz.length * 0.7) {
        scoreText.textContent += "Strong showing. The Council nods respectfully.";
      } else {
        scoreText.textContent += "The Council gasps dramatically.";
      }
    }
  </script>
